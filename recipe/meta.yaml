{% set name = "diffusers" %}
{% set version = "0.37.1" %}

package:
  name: {{ name|lower }}-suite
  version: {{ version }}

source:
  - url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
    sha256: a9cde8721b415bde6a678f2d02abb85396487e1b0e0d2b4abb462d14a9825ab0
    folder: source
    # PyPI sdists omit almost all of upstream tests/; the GitHub release archive matches the same tag and ships the full suite.
  - url: https://github.com/huggingface/diffusers/archive/refs/tags/v{{ version }}.tar.gz
    sha256: 374cae5ae915b5d42dca98cbf57c993a8f1916a90e184e9c34c8cbe937104313
    folder: tests

build:
  number: 0

outputs:
  - name: {{ name }}-base
    script: {{ PYTHON }} -m pip install source -vv --no-deps --no-build-isolation
    build:
      entry_points:
        - diffusers-cli=diffusers.commands.diffusers_cli:main
      skip: true  # [py<310 or py>=314]
    requirements:
      host:
        - pip
        - python
        - setuptools
        - wheel
      run:
        - python
        - importlib-metadata
        - filelock
        - httpx <1.0.0
        - huggingface_hub >=0.34.0,<2.0
        - numpy
        - regex !=2019.12.17
        - requests
        - safetensors >=0.3.1
        - pillow
      run_constrained:
        - huggingface_accelerate >=0.31.0
        - protobuf >=3.20.3,<4
        - peft >=0.17.0
        - pytorch >=1.4
    test:
      imports:
        - diffusers
        - diffusers.models
      commands:
        - pip check
      requires:
        - pip
  - name: diffusers-torch
    build:
      skip: true  # [py<310 or py>=314]
    requirements:
      host:
        - pip
        - python
        - setuptools
        - wheel
        - pytorch {{ pytorch }}
      run:
        - python
        - {{ pin_subpackage(name+'-base', exact=True) }}
        - pytorch >=1.4
        - huggingface_accelerate >=0.31.0
    test:
      # Multi-output builds move the original work/ tree; SRC_DIR during this test is test_tmp.
      # Copy the slice of upstream tests we run so pytest paths exist under $SRC_DIR.
      source_files:
        - tests/__init__.py
        - tests/conftest.py
        - tests/testing_utils.py
        - tests/models/__init__.py
        - tests/models/test_activations.py
        - tests/models/test_layers_utils.py
      imports:
        - diffusers
        - diffusers.models
      commands:
        - pip check
        # the diffusers-cli command requires pytorch at runtime,
        # https://github.com/huggingface/diffusers/blob/main/src/diffusers/commands/fp16_safetensors.py#L27
        - diffusers-cli --help
        # Upstream pytest: CPU-only, small model tests (full tests/ need optional deps and are too heavy for the feedstock).
        - bash -c 'export DIFFUSERS_TEST_DEVICE=cpu && cd "$SRC_DIR" && pytest tests/models/test_activations.py tests/models/test_layers_utils.py -q --tb=short'  # [unix]
      requires:
        - pip
        - pytest
        - packaging
  ## TODO: Enable once the flax toolchain is flushed out.
  # - name: diffusers-flax
  #   script: build_base.sh  # [unix]
  #   build:
  #     skip: true  # [win]
  #   requirements:
  #     host:
  #       - pip
  #       - python
  #       - setuptools
  #       - wheel
  #     run:
  #       - {{ pin_subpackage(name+'-base', exact=True) }}
  #       - jax >=0.2.8,!=0.3.2
  #       - jaxlib >=0.1.65
  #       - flax
  #   test:
  #     imports:
  #       - diffusers
  #       - diffusers.models
  #     commands:
  #       - pip check
  #       - diffusers-cli --help
  #     requires:
  #       - pip
  - name: diffusers
    build:
      skip: true  # [py<310 or py>=314]
    requirements:
      host:
        - pip
        - python
        - setuptools
        - wheel
      run:
        - python
        - {{ pin_subpackage(name+'-torch', exact=True) }}
    test:
      imports:
        - diffusers
        - diffusers.models
      commands:
        - pip check
        - diffusers-cli --help
      requires:
        - pip

about:
  home: https://github.com/huggingface/diffusers
  license: Apache-2.0
  license_file: LICENSE
  license_family: Apache
  summary: Diffusers provides pretrained vision diffusion models, and serves as a modular toolbox for inference and training.
  description: |
    :hugs: Diffusers provides pretrained diffusion models across multiple modalities,
    such as vision and audio, and serves as a modular toolbox for inference and
    training of diffusion models.

    PyPI: [https://pypi.org/project/diffusers/](https://pypi.org/project/diffusers/)

  doc_url: https://huggingface.co/docs/diffusers/index
  dev_url: https://github.com/huggingface/diffusers

extra:
  recipe-maintainers:
    - sugatoray
    # maintainers from upstream repo
    - anton-l
    - patrickvonplaten
